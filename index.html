<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Residencias Villacoa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media print { .no-print { display: none !important; } body { background-color: white !important; margin: 0; padding: 0; } #modal-recibo { position: absolute; top: 0; left: 0; width: 100%; display:block !important; } }
        .table-container { max-height: 60vh; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 0.5rem; }
        thead th { position: sticky; top: 0; background-color: #f8fafc; z-index: 10; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden font-sans text-gray-800">

    <aside class="w-64 bg-slate-900 text-white flex flex-col no-print">
        <div class="p-6 text-center border-b border-slate-800">
            <h1 class="text-lg font-bold">RESIDENCIAS</h1>
            <h2 class="text-xl font-light text-blue-400">VILLACOA</h2>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="changeView('dashboard')" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-800 text-left font-medium bg-slate-800 border-l-4 border-blue-500"><i class="fas fa-chart-pie w-6 text-blue-400"></i> Dashboard</button>
            <button onclick="changeView('historico')" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-800 text-left font-medium"><i class="fas fa-history w-6 text-green-400"></i> Histórico</button>
            <button onclick="changeView('propietarios')" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-800 text-left font-medium"><i class="fas fa-users w-6 text-purple-400"></i> Reportes</button>
            <button onclick="changeView('pagos')" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-800 text-left font-medium"><i class="fas fa-hand-holding-dollar w-6 text-emerald-400"></i> Registrar Pago</button>
            <button onclick="changeView('egresos')" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-800 text-left font-medium"><i class="fas fa-cogs w-6 text-orange-400"></i> Gastos</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center no-print border-b">
            <div><h2 class="text-2xl font-bold" id="header-title">Dashboard General</h2></div>
            <p class="text-sm">Tasa BCV: <span class="font-bold text-blue-600" id="header-tasa">667.05</span></p>
        </header>

        <div class="p-6 flex-1">
            <div id="view-dashboard" class="view active">
                <div class="flex gap-2 mb-4">
                    <input type="text" id="search-dashboard" placeholder="Apto (Ej: 13-B)..." class="border p-2 rounded w-48 text-sm" onkeyup="filtrarDashboard()">
                    <select id="filtro-estado-dashboard" class="border p-2 rounded text-sm" onchange="filtrarDashboard()">
                        <option value="todos">Todos los Estados</option>
                        <option value="solvente">Solventes</option>
                        <option value="moroso">Morosos</option>
                        <option value="convenio">Convenio</option>
                    </select>
                </div>
                <div class="table-container bg-white">
                    <table class="w-full text-left text-sm" id="tabla-dashboard">
                        <thead class="bg-slate-100"><tr><th class="p-3">Apto</th><th class="p-3">Propietario</th><th class="p-3 text-center">Estado</th><th class="p-3 text-right">Deuda</th><th class="p-3 text-center">Acción</th></tr></thead>
                        <tbody id="tbody-dashboard"></tbody>
                    </table>
                </div>
            </div>

            <!-- Historico, Reportes, Pagos, Egresos (Mismo contenido anterior, solo integrado) -->
            <div id="view-historico" class="view">
                <input type="file" id="input-excel" class="hidden" onchange="procesarExcel(event)">
                <button onclick="document.getElementById('input-excel').click()" class="bg-green-600 text-white p-2 rounded mb-4">Importar Excel</button>
                <div class="table-container bg-white"><table class="w-full" id="tabla-historico"><tbody id="tbody-historico"></tbody></table></div>
            </div>
            
            <div id="view-propietarios" class="view">
                <select id="filtro-estado-reporte" class="border p-2 mb-4" onchange="aplicarFiltroEstado()">
                    <option value="todos">Todos</option><option value="solvente">Solventes</option><option value="moroso">Morosos</option><option value="convenio">Convenio</option>
                </select>
                <div class="table-container bg-white" id="preview-content"><table class="w-full" id="tabla-preview"><tbody id="tbody-preview"></tbody></table></div>
            </div>

            <div id="view-pagos" class="view">
                <div class="max-w-xl mx-auto bg-white p-6 rounded shadow">
                    <select id="select-apto-pago" class="w-full border p-2 mb-4" onchange="mostrarDeudaPago()"></select>
                    <div id="deuda-badge-pago" class="p-3 mb-4 font-bold border rounded hidden text-center"></div>
                    <input type="number" id="pago-monto" placeholder="Monto ($)" class="w-full border p-2 mb-2" oninput="calcularEquivalenciaPago()">
                    <button onclick="autocompletarDeuda()" class="bg-blue-100 p-1 text-xs mb-2">Totalidad</button>
                    <p id="pago-equivalencia" class="mb-4 text-xs">Equivalente: Bs. 0.00</p>
                    <input type="date" id="pago-fecha" class="w-full border p-2 mb-2">
                    <input type="text" id="pago-banco" placeholder="Banco" class="w-full border p-2 mb-2">
                    <input type="text" id="pago-ref" placeholder="Ref" class="w-full border p-2 mb-4">
                    <button onclick="procesarPago()" class="w-full bg-green-600 text-white p-3 rounded">Guardar Pago</button>
                </div>
            </div>

            <div id="view-egresos" class="view">
                <div class="bg-white p-6 rounded"><div class="table-container"><table class="w-full" id="tbody-gastos-config"></table></div></div>
            </div>
        </div>
    </main>

    <script>
        let baseDatosVecinos = [];
        let ALICUOTA = 0.014925373;
        let CUOTA_BASE = 0;

        function changeView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
        }

        function procesarExcel(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const json = XLSX.utils.sheet_to_json(XLSX.read(data, {type: 'array'}).Sheets[Object.keys(XLSX.read(data, {type: 'array'}).Sheets)[0]], {header: 1, defval: ''});
                baseDatosVecinos = [];
                json.forEach(row => {
                    let aptoIdx = row.findIndex(c => String(c).trim().match(/^(\d{1,2}|PH|PB)-[A-Z0-9]$/i));
                    if (aptoIdx !== -1) {
                        let apto = String(row[aptoIdx]).trim();
                        if (apto === ',' || apto.toLowerCase().includes('total')) return;
                        let nombre = String(row[aptoIdx + 1] || 'S/N').trim();
                        const parse = (v) => parseFloat(String(v).replace(/[^0-9.-]+/g,"")) || 0;
                        baseDatosVecinos.push({ apto, nombre, y22: parse(row[aptoIdx+2]), y23: parse(row[aptoIdx+3]), y24: parse(row[aptoIdx+4]), y25: parse(row[aptoIdx+5]), y26_em: parse(row[aptoIdx+6]), abono: parse(row[aptoIdx+8] || row[aptoIdx+7]) });
                    }
                });
                guardarEnNube();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        }

        async function guardarEnNube() {
            await fetch('/api/importarHistorico', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ propietarios: baseDatosVecinos }) });
            actualizarTodasLasVistas();
        }

        function actualizarTodasLasVistas() {
            const tbody = document.getElementById('tbody-dashboard');
            tbody.innerHTML = '';
            baseDatosVecinos.forEach(v => {
                let total = Math.round((v.y22 + v.y23 + v.y24 + v.y25 + v.y26_em + CUOTA_BASE - v.abono) * 100) / 100;
                if (total < 0) total = 0;
                let status = total === 0 ? 'solvente' : (v.nombre.includes('(CONVENIO)') ? 'convenio' : 'moroso');
                let tag = status === 'solvente' ? '<span class="bg-green-100 p-1 rounded">Solvente</span>' : (status === 'convenio' ? '<span class="bg-yellow-100 p-1 rounded">Convenio</span>' : '<span class="bg-red-100 p-1 rounded">Moroso</span>');
                
                tbody.innerHTML += `<tr data-status="${status}" data-apto="${v.apto.toLowerCase()}">
                    <td class="p-3 font-bold">${v.apto}</td><td>${v.nombre.replace('(CONVENIO)', '')}</td>
                    <td class="text-center">${tag}</td><td class="text-right">$${total.toFixed(2)}</td>
                    <td class="text-center"><button onclick="toggleConvenio('${v.apto}')">🤝</button></td>
                </tr>`;
            });
        }

        async function toggleConvenio(apto) {
            let v = baseDatosVecinos.find(x => x.apto === apto);
            v.nombre = v.nombre.includes('(CONVENIO)') ? v.nombre.replace('(CONVENIO)', '') : v.nombre + '(CONVENIO)';
            guardarEnNube();
        }

        function filtrarDashboard() {
            const text = document.getElementById('search-dashboard').value.toLowerCase();
            const status = document.getElementById('filtro-estado-dashboard').value;
            document.querySelectorAll('#tbody-dashboard tr').forEach(tr => {
                const matchText = tr.dataset.apto.includes(text);
                const matchStatus = status === 'todos' || tr.dataset.status === status;
                tr.style.display = (matchText && matchStatus) ? '' : 'none';
            });
        }

        function mostrarDeudaPago() {
            const v = baseDatosVecinos.find(x => x.apto === document.getElementById('select-apto-pago').value);
            if (!v) return;
            const deuda = Math.round((v.y22 + v.y23 + v.y24 + v.y25 + v.y26_em + CUOTA_BASE - v.abono) * 100) / 100;
            const badge = document.getElementById('deuda-badge-pago');
            badge.innerText = 'Deuda: $' + (deuda < 0 ? 0 : deuda).toFixed(2);
            badge.className = deuda <= 0 ? 'p-3 mb-4 font-bold border rounded text-center bg-green-100 text-green-800' : 'p-3 mb-4 font-bold border rounded text-center bg-red-100 text-red-800';
            badge.classList.remove('hidden');
        }

        function calcularEquivalenciaPago() {
            const m = parseFloat(document.getElementById('pago-monto').value) || 0;
            const tasa = parseFloat(document.getElementById('header-tasa').innerText) || 667.05;
            document.getElementById('pago-equivalencia').innerText = 'Equivalente: Bs. ' + (m * tasa).toLocaleString('es-VE', {minimumFractionDigits:2});
        }

        async function procesarPago() {
            const pago = { apartamento: document.getElementById('select-apto-pago').value, monto: document.getElementById('pago-monto').value, fecha: document.getElementById('pago-fecha').value, referencia: document.getElementById('pago-banco').value + ' - ' + document.getElementById('pago-ref').value };
            const res = await fetch('/api/addPago', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(pago) });
            if ((await res.json()).success) { alert('Pago procesado'); actualizarTodasLasVistas(); } else { alert('Error conectando a BD'); }
        }

        window.onload = () => { /* Inicia carga desde nube */ };
    </script>
</body>
</html>
