<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Villacoa - Sistema de Gestión</title>
    <!-- Tailwind CSS (CDN Estable) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (CDN Estable) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <!-- SheetJS para Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .table-container { max-height: 60vh; overflow-y: auto; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900">

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white flex flex-col p-4">
            <div class="text-center py-6 border-b border-slate-700 mb-4">
                <h1 class="text-xl font-bold text-blue-400">VILLACOA</h1>
            </div>
            <nav class="space-y-2 flex-1">
                <button onclick="changeView('dashboard')" class="w-full text-left p-3 rounded hover:bg-slate-800 transition"><i class="fas fa-chart-line mr-2"></i> Dashboard</button>
                <button onclick="changeView('historico')" class="w-full text-left p-3 rounded hover:bg-slate-800 transition"><i class="fas fa-history mr-2"></i> Histórico</button>
                <button onclick="changeView('reportes')" class="w-full text-left p-3 rounded hover:bg-slate-800 transition"><i class="fas fa-file-alt mr-2"></i> Reportes</button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-6">
            <div id="view-dashboard" class="view active">
                <h2 class="text-2xl font-bold mb-6">Dashboard General</h2>
                <div id="dashboard-content" class="text-center py-20 bg-white rounded-lg shadow border">
                    <i class="fas fa-upload text-4xl text-gray-300 mb-4"></i>
                    <p class="text-gray-500">Cargue su archivo en "Histórico" para ver las estadísticas.</p>
                </div>
            </div>

            <div id="view-historico" class="view">
                <h2 class="text-2xl font-bold mb-6">Histórico de Movimientos</h2>
                <div class="bg-white p-6 rounded shadow">
                    <input type="file" id="excel-input" class="hidden" accept=".xlsx, .xls">
                    <button onclick="document.getElementById('excel-input').click()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
                        <i class="fas fa-file-excel mr-2"></i> Importar Excel
                    </button>
                    <div id="table-historico-wrapper" class="mt-6"></div>
                </div>
            </div>

            <div id="view-reportes" class="view">
                <h2 class="text-2xl font-bold mb-6">Reportes Especiales</h2>
                <div id="reporte-content" class="bg-white p-6 rounded shadow"></div>
            </div>
        </main>
    </div>

    <script>
        // Lógica Global del sistema sin dependencias externas riesgosas
        let baseDatos = [];

        function changeView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
        }

        document.getElementById('excel-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(evt) {
                try {
                    const data = new Uint8Array(evt.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheetName = workbook.SheetNames[0];
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
                    
                    // Procesamiento inteligente
                    procesarDatos(jsonData);
                } catch (err) {
                    console.error("Error al leer:", err);
                    alert("No se pudo leer el archivo. Asegúrese de que sea un Excel válido.");
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function procesarDatos(data) {
            baseDatos = data;
            renderHistorico();
            alert("Datos importados correctamente. Total de registros: " + data.length);
        }

        function renderHistorico() {
            const container = document.getElementById('table-historico-wrapper');
            if(baseDatos.length === 0) return;

            let html = `<table class="w-full text-sm border-collapse">
                <thead><tr class="bg-gray-100 border-b">
                    <th class="p-2">Apto</th><th class="p-2">Propietario</th><th class="p-2">Deuda Total</th>
                </tr></thead><tbody>`;

            baseDatos.forEach(row => {
                // Ajustar claves según los nombres reales del Excel
                const apto = row['Apto'] || row['apto'] || "N/A";
                const nombre = row['Propietario'] || row['nombre'] || "Sin nombre";
                html += `<tr><td class="p-2 border">${apto}</td><td class="p-2 border">${nombre}</td></tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }
    </script>
</body>
</html>
